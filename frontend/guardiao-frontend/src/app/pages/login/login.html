<mat-card>

<h2>Login</h2>


<mat-form-field>

<input 
matInput
placeholder="Email"
[(ngModel)]="email">

</mat-form-field>



<mat-form-field>

<input
matInput
type="password"
placeholder="Senha"
[(ngModel)]="password">

</mat-form-field>



<button
mat-raised-button
color="primary"
(click)="entrar()">

Entrar

</button>


<p *ngIf="erro">
{{erro}}
</p>


</mat-card>
